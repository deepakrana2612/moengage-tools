# render.yaml — Render.com deployment blueprint
# Push this file to your GitHub repo root.
# On Render: New → Blueprint → connect repo → done.

services:
  - type: web
    name: moengage-tools
    env: node
    region: oregon           # closest to T-Mobile HQ (Bellevue, WA)
    plan: free               # upgrade to 'starter' ($7/mo) for always-on

    # Build: install deps + build React app
    buildCommand: npm install && npm run build

    # Start the unified server
    startCommand: npm start

    # Health check so Render knows when the app is ready
    healthCheckPath: /health

    # Environment variables — set these in Render dashboard (never commit real values)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MOENGAGE_BASE_URL
        value: https://api-01.moengage.com    # change DC if needed (e.g. api-02)
      - key: MOENGAGE_APP_ID
        sync: false          # enter manually in Render dashboard
      - key: MOENGAGE_API_KEY
        sync: false          # enter manually in Render dashboard
