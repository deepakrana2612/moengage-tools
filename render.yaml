# render.yaml — Render.com deployment blueprint
# Push this file to your GitHub repo root.
# On Render: New → Blueprint → connect repo → deploy.

services:
  - type: web
    name: moengage-tools
    env: node
    region: oregon
    plan: free               # upgrade to 'starter' ($7/mo) for always-on

    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # No MoEngage credentials needed — passed per-request from the UI
