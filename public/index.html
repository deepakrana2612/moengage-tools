<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoEngage Tools — T-Mobile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .logo {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e20074;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 960px;
      margin-bottom: 40px;
    }

    .logout {
      font-size: 12px;
      color: #444;
      text-decoration: none;
      border: 1px solid #222;
      padding: 6px 14px;
      border-radius: 6px;
      transition: color .2s, border-color .2s;
    }
    .logout:hover { color: #e20074; border-color: #e20074; }

    h1 {
      font-size: 38px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    h1 span { color: #e20074; }

    header p {
      margin-top: 12px;
      color: #888;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 960px;
      width: 100%;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px 28px;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      border-color: #e20074;
      transform: translateY(-3px);
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
    }

    .card .tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #e20074;
      font-weight: 600;
    }

    .health-bar {
      margin-top: 64px;
      text-align: center;
      font-size: 12px;
      color: #444;
    }

    .health-bar a {
      color: #555;
      text-decoration: none;
    }

    .health-bar a:hover { color: #e20074; }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="header-row">
    <header>
      <div class="logo">T-Mobile · MoEngage</div>
      <h1>Marketing <span>Utility</span> Suite</h1>
      <p>Internal tools for the MarTech & Campaign Operations team</p>
    </header>
    <div style="display:flex;gap:10px;align-items:center">
      <a class="logout" href="/admin" id="adminLink" style="display:none">⚙️ Admin</a>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </div>
  <script>
    // Show admin link only if user is admin
    fetch('/admin/users').then(r => { if (r.ok) document.getElementById('adminLink').style.display = 'inline-block'; });
  </script>

  <div class="grid" id="toolsGrid">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:#444;font-size:14px">Loading your tools…</div>
  </div>

  <div class="health-bar">
    <span class="dot"></span>
    Server healthy ·
    <a href="/health">View health check</a> ·
    Built for T-Mobile Internal Use
  </div>

  <script>
    async function loadDashboard() {
      const res  = await fetch('/api/my-tools');
      if (!res.ok) { window.location.href = '/login'; return; }
      const { tools, isAdmin, displayName } = await res.json();

      // Show admin link
      if (isAdmin) document.getElementById('adminLink').style.display = 'inline-block';

      // Render tool cards
      const grid = document.getElementById('toolsGrid');
      if (!tools.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#444;font-size:14px">No tools assigned yet. Contact your admin.</div>';
        return;
      }

      grid.innerHTML = tools.map(t => `
        <a class="card" href="${t.url}">
          <div class="card-icon">${t.icon}</div>
          <h2>${t.name}</h2>
          <p>${t.description}</p>
        </a>
      `).join('');
    }

    loadDashboard();
  </script>
